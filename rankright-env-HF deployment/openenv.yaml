name: backend

description: >
  A policy-aware recommendation environment where an AI agent must optimize
  feed ranking under governance constraints including signal selection,
  diversity, safety, and policy compliance.

version: "1.0"

entrypoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Clear user preferences with simple signal selection
    grader:
      type: numeric
      key: score

  - id: medium
    description: Ambiguous user intent requiring optional signal reasoning
    grader:
      type: numeric
      key: score

  - id: hard
    description: Policy conflict scenario with risky content and restricted signals
    grader:
      type: numeric
      key: score

metadata:
  author: BugSlayyers
  category: recommendation-governance
  difficulty: progressive